<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/Logo_v3.png" type="image/png">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            /* Dynamischer animierter Farbverlauf */
            background: linear-gradient(120deg, #0a1a3d, #0f3b7a, #1a73e8, #00b4ff);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partikel */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particles span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: floatUp 8s linear infinite;
            filter: blur(1px);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .login-container {
            position: relative;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 22px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0,180,255,0.7);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(0,180,255,0.4); }
            50% { box-shadow: 0 0 40px rgba(0,180,255,0.9); }
            100% { box-shadow: 0 0 20px rgba(0,180,255,0.4); }
        }

        h2 {
            margin-bottom: 25px;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0,180,255,0.6);
        }

        /* Floating Label */
        .input-group {
            position: relative;
            margin-bottom: 28px;
        }

        .input-group input {
            width: 93%;
            padding: 14px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00b4ff;
            box-shadow: 0 0 15px rgba(0,180,255,0.7);
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #dce6ff;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -8px;
            left: 10px;
            font-size: 12px;
            color: #8fd6ff;
            background: rgba(0,0,0,0.35);
            padding: 0 6px;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #00b4ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,180,255,0.7);
        }

        .links {
            margin-top: 18px;
            text-align: center;
        }

        .links a {
            color: #cfe8ff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .links a:hover {
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.7);
        }
    </style>
</head>

<body>

    <!-- Partikel generieren -->
    <div class="particles">
        <!-- 25 Partikel -->
        <script>
            for (let i = 0; i < 25; i++) {
                const p = document.createElement("span");
                p.style.left = Math.random() * 100 + "vw";
                p.style.animationDelay = Math.random() * 8 + "s";
                p.style.opacity = Math.random();
                document.querySelector(".particles").appendChild(p);
            }
        </script>
    </div>

    <div class="login-container">

        <img src="./static/Logo_v3.png" alt="Logo" class="logo">

        <h2>Einloggen</h2>

         <form action="/login2" method="post">
            <div class="input-group">
                <input name="username" placeholder=" " required>
                <label for="email">User-name</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder=" " required>
                <label for="password">Passwort</label>
            </div>

            {% if error %}
                <div style="
                    margin-top: 12px;
                    margin-bottom: 20px;
                    padding: 12px;
                    background: rgba(255, 80, 80, 0.2);
                    border: 1px solid rgba(255, 80, 80, 0.5);
                    color: #ff4d4d;
                    border-radius: 10px;
                    font-size: 15px;
                    text-shadow: 0 0 6px rgba(255, 80, 80, 0.6);
                    box-shadow: 0 0 12px rgba(255, 80, 80, 0.4);
                    ">
                    {{ error }}
                </div>

            {% endif %}

            {% if message %}
                <div style="
                    margin-top: 12px;
                    margin-bottom: 20px;
                    padding: 12px;
                    background: rgba(80, 255, 86, 0.2);
                    border: 1px solid rgba(80, 255, 92, 0.5);
                    color: #5cff4d;
                    border-radius: 10px;
                    font-size: 15px;
                    text-shadow: 0 0 6px rgba(103, 255, 80, 0.6);
                    box-shadow: 0 0 12px rgba(112, 255, 80, 0.4);
                    ">
                    {{ message }}
                </div>
            {% endif %}


            <button type="submit">Einloggen</button>

            <div class="links">
                <a href="/pw_vergessen">Passwort vergessen?</a><br>
                <a href="/registrieren">Neues Konto erstellen</a>
            </div>
        </form>
    </div>

</body>
</html>
