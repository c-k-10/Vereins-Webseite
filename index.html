<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>Vereinswebseite</title>
</head>

<style>
    body{
        background-color: #EFF1F2;
        margin: 0;
        font-family: "Montserrat", sans-serif;
    }

    #bild_logo{
        width: 300px;
        height: auto;
        transition: transform .5s;
    }

    #bild_logo:hover{
        transform: scale(1.05);
    }

    #logo{
        text-align: center;
        background-color: #e6e6e6;
        /* -webkit-box-shadow: 6px 5px 22px 2px #000000; 
        box-shadow: 6px 5px 22px 2px #000000; */
    }

    #abteilungen{
        display: flex;
        justify-content: space-between;
        background-color: #295ab7;
        padding: 15px;
        height: 300px;
    }

    #bild_fussball{
        width: 250px;
        height: auto;
    }

    #name_fb{
        margin-left: 202px;
        font-size: 23px;
    }

    #fussball {
        border: solid 3px;
        display: flex;
        background-color: #eff0f0;
        text-align: center;
        justify-content: center;
        width: 200px;
        height: 200px;
        margin-left: 150px;
        border-radius: 10px;
        -webkit-box-shadow: 6px 5px 22px 2px #00000092; 
        box-shadow: 6px 5px 22px 2px #00000092;
        transition: transform .5s;
    }

    #fussball:hover{
        transform: scale(1.03);
        border-color: #1900ff;
    }

    
    #bild_handball{
        width: 150px;
        height: auto;
    }

    #name_hb{
        margin-left: 47px;
        font-size: 23px;
    }

    #handball {
        border: solid 3px;
        background-color: #eff0f0;
        display: flex;
        text-align: center;
        justify-items: center;
        width: 200px;
        height: 200px;
        border-radius: 10px;
        -webkit-box-shadow: 6px 5px 22px 2px #00000092; 
        box-shadow: 6px 5px 22px 2px #00000092;
        transition: transform .5s;
    }

    #handball:hover{
         transform: scale(1.03);
        border-color: #1900ff;  
    }

    
    #bild_tennis{
        width: 150px;
        height: auto;
    }

    #name_tn{
        margin-left: 60px;
        font-size: 23px;
    }

    #tennis {
        border: solid 3px;
        background-color: #eff0f0;
        display: flex;
        text-align: center;
        justify-content: center;
        width: 200px;
        height: 200px;
        margin-right: 150px;
        border-radius: 10px;
        -webkit-box-shadow: 6px 5px 22px 2px #00000092; 
        box-shadow: 6px 5px 22px 2px #00000092;
         transition: transform .5s;
    }

    #tennis:hover{
         transform: scale(1.03);
        border-color: #1900ff;  
    }

    #news{
        width: 100%;
        height: 500px;
        padding: 10px;
    }

    #news_text {
        margin-left: 40px;
    }

    #news_bilder{
        display: flex;
        justify-content: space-evenly;
    }

    #fussball_news{
        width: 400px;
    }

    #handball_news{
        width: 400px;
    }

    #tennis_news{
        width: 400px;
    }

    #impressum{
        background-color: #295ab7;
        width: 100%;
        height: 150px;
        margin-top: 20px;
        /* border-radius: 10px; */
    }

</style>
<body>

<div id="logo">
    <img src="./Logo_v3.png" id="bild_logo">
</div>

<div id="abteilungen">
    <div>
    <h3 id="name_fb">Fussball</h3>
    <div id="fussball">
        <img src="./fussball.png" id="bild_fussball">
    </div>
    </div>


    <div>
    <h3 id="name_hb">Handball</h3>
    <div id="handball">
        <img src="./handball.png" id="bild_handball">
        
    </div>
    </div>



    <div>
    <h3 id="name_tn">Tennis</h3>
    <div id="tennis">
        <img src="./tennis.png" id="bild_tennis">
    </div>
    </div>

</div>

<div id="news">
    <h1 id="news_text">Neuigkeiten aus dem Verein</h1>
    <div id="news_bilder">
    <img src="./fussball_news.png" id="fussball_news">
    <img src="./handball_news.png" id="handball_news">
    <img src="./tennis_news.png" id="tennis_news">
    </div>
</div>

<div id="impressum">
    <h3>Impressum</h3>
</div>
    
    
</body>
</html>
